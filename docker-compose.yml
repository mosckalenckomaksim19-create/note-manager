version: '3.8'

services:
  nginx:
    image: nginx:latest
    container_name: note-manager-nginx
    ports:
      - "8082:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - app-network

  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: note-manager-php
    volumes:
      - ./:/var/www/html
    networks:
      - app-network
    environment:
      - PHP_IDE_CONFIG=serverName=localhost

networks:
  app-network:
    driver: bridge
